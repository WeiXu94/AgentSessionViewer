name: Release

# Tag a release-shaped commit to build installers for macOS, Windows and Linux
# and upload them to a GitHub Release. Keep the tag in sync with package.json
# version, e.g. version 0.1.0 -> tag v0.1.0.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build installers
        env:
          # No Apple/Windows signing certs in CI — skip signing.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: bun run build && bunx electron-builder --publish never

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
