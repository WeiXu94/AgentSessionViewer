appId: com.weixu.agentsessionviewer
productName: AgentSessionViewer
copyright: Copyright © 2026 weixu

directories:
  output: release
  buildResources: resources

# Only ship the built output. electron-builder always adds the production
# node_modules (chalk/yaml/zod) and package.json on top of this.
files:
  - out/**/*

asar: true

mac:
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  # Unsigned, ad-hoc build so CI without an Apple certificate succeeds.
  # Users open via right-click → Open (Gatekeeper) the first time.
  identity: null
  target:
    - target: dmg
      arch: [arm64, universal]

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  icon: resources/icon.png
  category: Development
  target:
    - target: AppImage
      arch: [x64]

# No `publish:` block on purpose. CI builds locally, then uploads only the
# installer assets selected by `.github/workflows/release.yml`.
